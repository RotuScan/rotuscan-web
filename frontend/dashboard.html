<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotuScan - Meus Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --rotuscan-green: #2ecc71;
            --rotuscan-dark: #2c3e50;
            --bg-light: #f4f7f6;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Menu Lateral (Sidebar Clara igual a imagem) */
        .sidebar {
            height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            position: fixed;
            width: 260px;
            padding-top: 20px;
        }
        
        .sidebar-brand {
            font-size: 24px;
            font-weight: bold;
            color: var(--rotuscan-dark);
            text-align: center;
            margin-bottom: 40px;
        }
        .sidebar-brand i { color: var(--rotuscan-green); }

        .nav-item-custom {
            padding: 12px 20px;
            color: #6c757d;
            text-decoration: none;
            display: block;
            font-weight: 500;
            margin: 5px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .nav-item-custom:hover { background-color: #f8f9fa; color: var(--rotuscan-dark); }
        .nav-item-custom.active {
            background-color: #eafaf1;
            color: var(--rotuscan-green);
        }
        .nav-item-custom i { width: 25px; }

        /* Área Principal */
        .main-content {
            margin-left: 260px;
            padding: 20px 40px;
        }

        /* Topbar (Busca e Perfil) */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box {
            position: relative;
            width: 350px;
        }
        .search-box input {
            padding-left: 40px;
            border-radius: 20px;
            border: 1px solid #ced4da;
        }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 10px;
            color: #adb5bd;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .profile-text { text-align: right; line-height: 1.2; }
        .profile-text strong { display: block; color: var(--rotuscan-dark); }
        .profile-text small { color: #6c757d; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        /* Estilo da Tabela e Cards */
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .table-hover tbody tr { cursor: pointer; transition: 0.2s; }
        .table-hover tbody tr:hover { background-color: #f1f8f5; transform: scale(1.005); }
        
        .avatar-sm { width: 35px; height: 35px; border-radius: 50%; background-color: #e9ecef; display: inline-flex; align-items: center; justify-content: center; color: var(--rotuscan-dark); font-weight: bold; margin-right: 10px; }
        
        .btn-green { background-color: var(--rotuscan-green); color: white; border: none; }
        .btn-green:hover { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-shield-halved"></i> RotuScan
        </div>
        <a href="#" class="nav-item-custom"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="#" class="nav-item-custom active"><i class="fa-solid fa-users"></i> Pacientes</a>
        <a href="#" class="nav-item-custom"><i class="fa-solid fa-apple-whole"></i> Dietas e Alertas</a>
        <a href="#" class="nav-item-custom mt-5 text-danger" onclick="sair()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a>
    </div>

    <div class="main-content">
        
        <div class="topbar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="inputBusca" class="form-control" placeholder="Buscar paciente por nome ou e-mail..." onkeyup="filtrarPacientes()">
            </div>
            
            <div class="profile-area">
                <i class="fa-regular fa-bell fs-5 text-muted position-relative me-3">
                    <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                </i>
                <div class="profile-text">
                    <strong id="nomeNutricionista">Dr. Ricardo Ogawa</strong>
                    <small>Nutricionista Clínico</small>
                </div>
                <img src="https://ui-avatars.com/api/?name=Ricardo+Ogawa&background=2ecc71&color=fff" class="profile-img" alt="Foto Perfil">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0 fw-bold" style="color: var(--rotuscan-dark);">Meus Pacientes</h2>
                <p class="text-muted mt-1">Total: <span id="contadorPacientes" class="fw-bold">0</span> pacientes cadastrados</p>
            </div>
            <button class="btn btn-green px-4 py-2 rounded-pill shadow-sm"><i class="fa-solid fa-plus me-2"></i> Novo Paciente</button>
        </div>

        <div class="card card-custom">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="tabelaPacientes">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4 py-3">Paciente</th>
                                <th>Restrições Mapeadas</th>
                                <th>Última Consulta</th>
                                <th>Status do App</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaPacientes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // MOCK DE DADOS (Baseado nas entrevistas do seu TCC)
        const pacientesData = [
            { id: 1, nome: "Victoria", email: "victoria@email.com", restricoes: ["Lactose"], ultimaConsulta: "10/05/2026", status: "Ativo" },
            { id: 2, nome: "Luiz Claudio Barreto", email: "luiz@email.com", restricoes: ["Glúten", "Trigo"], ultimaConsulta: "02/05/2026", status: "Ativo" },
            { id: 3, nome: "João Silva", email: "joao@email.com", restricoes: ["Amendoim"], ultimaConsulta: "28/04/2026", status: "Inativo" }
        ];

        // Função para renderizar a tabela
        function carregarPacientes(dados) {
            const tbody = document.getElementById('listaPacientes');
            document.getElementById('contadorPacientes').innerText = dados.length;
            tbody.innerHTML = '';

            if (dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Nenhum paciente encontrado.</td></tr>';
                return;
            }

            dados.forEach(paciente => {
                const tr = document.createElement('tr');
                // Ao clicar na linha, chama a função de abrir o paciente
                tr.onclick = () => abrirPaciente(paciente.id, paciente.nome);

                const statusBadge = paciente.status === 'Ativo' 
                    ? '<span class="badge bg-success bg-opacity-25 text-success rounded-pill px-3">Ativo</span>'
                    : '<span class="badge bg-secondary bg-opacity-25 text-secondary rounded-pill px-3">Inativo</span>';

                const inicial = paciente.nome.charAt(0);

                tr.innerHTML = `
                    <td class="ps-4 py-3">
                        <div class="d-flex align-items-center">
                            <div class="avatar-sm">${inicial}</div>
                            <div>
                                <h6 class="mb-0 fw-bold">${paciente.nome}</h6>
                                <small class="text-muted">${paciente.email}</small>
                            </div>
                        </div>
                    </td>
                    <td><span class="text-danger fw-semibold">${paciente.restricoes.join(', ')}</span></td>
                    <td class="text-muted">${paciente.ultimaConsulta}</td>
                    <td>${statusBadge}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-light text-primary rounded-circle me-1"><i class="fa-solid fa-eye"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Função da Barra de Pesquisa em tempo real
        function filtrarPacientes() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = pacientesData.filter(p => 
                p.nome.toLowerCase().includes(termo) || 
                p.email.toLowerCase().includes(termo)
            );
            carregarPacientes(filtrados);
        }

        // Função que simula a abertura do perfil individual
        function abrirPaciente(id, nome) {
            // Em um sistema real, faríamos: window.location.href = `paciente.html?id=${id}`;
            alert(`Abrindo o painel individual do paciente: ${nome}\n(A próxima tela que iremos construir!)`);
        }

        function sair() {
            localStorage.removeItem('token');
            window.location.href = 'index.html'; // Volta pro Login
        }

        // Inicia a tela carregando os pacientes
        window.onload = () => carregarPacientes(pacientesData);
    </script>
</body>
</html>
